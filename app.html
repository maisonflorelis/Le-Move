<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Move — Mon Espace</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@200;300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #F7F3EE; --warm-white: #FDFAF6; --linen: #E8E0D5; --sand: #C9BAA8;
    --espresso: #2C1F14; --warm-black: #1A1410; --sage: #7A8C7E;
    --terracotta: #C4714A; --gold: #B89A6A; --text-light: #8A7968;
  }
  body { background: var(--cream); font-family: 'DM Sans', sans-serif; color: var(--espresso); min-height: 100vh; }

  /* ── AUTH SCREEN ── */
  .auth-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--espresso);
    position: relative;
    overflow: hidden;
  }
  .auth-screen::before {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.04);
    top: -200px; right: -200px;
  }
  .auth-screen::after {
    content: '';
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.04);
    bottom: -100px; left: -100px;
  }
  .auth-card {
    background: var(--cream);
    border-radius: 20px;
    padding: 48px;
    width: 100%;
    max-width: 420px;
    position: relative;
    z-index: 1;
  }
  .auth-logo {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 28px;
    color: var(--espresso);
    margin-bottom: 4px;
  }
  .auth-sub {
    font-size: 9px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-light);
    margin-bottom: 32px;
  }
  .auth-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 300;
    font-style: italic;
    color: var(--espresso);
    margin-bottom: 24px;
  }
  .auth-field { margin-bottom: 16px; }
  .auth-label {
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-light);
    display: block;
    margin-bottom: 8px;
  }
  .auth-input {
    width: 100%;
    padding: 12px 16px;
    background: var(--warm-white);
    border: 1px solid var(--linen);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 300;
    color: var(--espresso);
    outline: none;
    transition: border-color 0.2s;
  }
  .auth-input:focus { border-color: var(--terracotta); }
  .auth-btn {
    width: 100%;
    padding: 14px;
    background: var(--espresso);
    color: var(--cream);
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s;
  }
  .auth-btn:hover { opacity: 0.85; }
  .auth-error {
    background: #FEF2F2;
    border: 1px solid #FCA5A5;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    color: #DC2626;
    margin-top: 12px;
    display: none;
  }
  .auth-forgot {
    text-align: center;
    margin-top: 16px;
    font-size: 11px;
    color: var(--text-light);
    cursor: pointer;
    text-decoration: underline;
  }

  /* ── APP SCREEN ── */
  .app-screen { display: none; }

  /* NAV */
  .app-nav {
    background: var(--espresso);
    padding: 0 48px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-brand { display: flex; align-items: center; gap: 12px; }
  .nav-logo { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 22px; color: var(--cream); }
  .nav-sep { width: 1px; height: 20px; background: rgba(255,255,255,0.1); }
  .nav-plan-badge {
    font-size: 8px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(247,243,238,0.5);
    background: rgba(255,255,255,0.07);
    padding: 4px 10px;
    border-radius: 20px;
  }
  .nav-right { display: flex; align-items: center; gap: 16px; }
  .nav-user { font-size: 12px; font-weight: 300; color: rgba(247,243,238,0.6); }
  .nav-logout {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(247,243,238,0.35);
    cursor: pointer;
    transition: color 0.2s;
    background: none;
    border: none;
    font-family: 'DM Sans', sans-serif;
  }
  .nav-logout:hover { color: rgba(247,243,238,0.7); }

  /* WELCOME BANNER */
  .welcome-banner {
    background: var(--warm-white);
    border-bottom: 1px solid var(--linen);
    padding: 32px 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .welcome-greeting {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px;
    font-weight: 300;
    font-style: italic;
    color: var(--espresso);
    line-height: 1.2;
  }
  .welcome-greeting span { color: var(--terracotta); }
  .welcome-sub {
    font-size: 12px;
    font-weight: 200;
    color: var(--text-light);
    margin-top: 6px;
    font-style: italic;
  }
  .welcome-progress {
    text-align: right;
  }
  .progress-label {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-light);
    margin-bottom: 8px;
  }
  .progress-bar-wrap {
    width: 180px;
    height: 4px;
    background: var(--linen);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--terracotta);
    border-radius: 2px;
    transition: width 1s ease;
    width: 0%;
  }
  .progress-pct {
    font-size: 11px;
    color: var(--text-light);
    margin-top: 6px;
    font-style: italic;
  }

  /* MAIN CONTENT */
  .app-content { padding: 40px 48px; max-width: 1200px; }

  /* SECTION TITLE */
  .section-label {
    font-size: 9px;
    font-weight: 300;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-light);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--linen); }

  /* MODULES GRID */
  .modules-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 48px;
  }

  .module-card {
    background: var(--warm-white);
    border: 1px solid var(--linen);
    border-radius: 16px;
    padding: 28px;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }
  .module-card:hover:not(.locked) {
    border-color: var(--sand);
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(44,31,20,0.08);
  }
  .module-card.locked {
    opacity: 0.5;
    cursor: default;
  }
  .module-card.locked::after {
    content: '🔒';
    position: absolute;
    top: 16px;
    right: 16px;
    font-size: 14px;
  }
  .module-card.featured {
    background: var(--espresso);
    border-color: var(--espresso);
  }

  .module-num {
    font-size: 9px;
    font-weight: 300;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-light);
    margin-bottom: 16px;
  }
  .module-card.featured .module-num { color: rgba(247,243,238,0.35); }

  .module-icon { font-size: 28px; margin-bottom: 14px; }

  .module-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 300;
    font-style: italic;
    color: var(--espresso);
    margin-bottom: 8px;
    line-height: 1.2;
  }
  .module-card.featured .module-title { color: var(--cream); }

  .module-desc {
    font-size: 11px;
    font-weight: 200;
    color: var(--text-light);
    line-height: 1.7;
  }
  .module-card.featured .module-desc { color: rgba(247,243,238,0.5); }

  .module-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 16px;
  }
  .module-tag {
    font-size: 9px;
    font-weight: 300;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 20px;
    background: var(--linen);
    color: var(--text-light);
  }
  .module-card.featured .module-tag { background: rgba(255,255,255,0.1); color: rgba(247,243,238,0.5); }

  .module-arrow {
    position: absolute;
    bottom: 20px;
    right: 20px;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--linen);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    transition: all 0.2s;
  }
  .module-card:hover:not(.locked) .module-arrow { background: var(--terracotta); color: white; }
  .module-card.featured .module-arrow { background: rgba(255,255,255,0.1); color: var(--cream); }

  /* UPGRADE CARD */
  .upgrade-card {
    background: linear-gradient(135deg, var(--terracotta), #A85A35);
    border-radius: 16px;
    padding: 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 48px;
  }
  .upgrade-text {}
  .upgrade-label {
    font-size: 9px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
    margin-bottom: 8px;
  }
  .upgrade-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-style: italic;
    color: white;
    margin-bottom: 6px;
  }
  .upgrade-desc { font-size: 12px; font-weight: 200; color: rgba(255,255,255,0.7); }
  .upgrade-btn {
    background: white;
    color: var(--terracotta);
    border: none;
    padding: 12px 24px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.2s;
  }
  .upgrade-btn:hover { opacity: 0.9; }

  /* TUTORIAL OVERLAY */
  .tutorial-overlay {
    position: fixed;
    inset: 0;
    background: rgba(44,31,20,0.7);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  .tutorial-card {
    background: var(--cream);
    border-radius: 20px;
    padding: 48px;
    max-width: 520px;
    width: 90%;
    position: relative;
  }
  .tutorial-step-indicator {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-light);
    margin-bottom: 24px;
    display: flex;
    gap: 6px;
  }
  .tut-dot {
    width: 24px; height: 3px;
    border-radius: 2px;
    background: var(--linen);
    transition: background 0.3s;
  }
  .tut-dot.active { background: var(--terracotta); }
  .tut-dot.done { background: var(--sage); }

  .tutorial-icon { font-size: 40px; margin-bottom: 16px; }
  .tutorial-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 300;
    font-style: italic;
    color: var(--espresso);
    margin-bottom: 12px;
    line-height: 1.2;
  }
  .tutorial-text {
    font-size: 13px;
    font-weight: 200;
    color: var(--text-light);
    line-height: 1.8;
    margin-bottom: 32px;
    font-style: italic;
  }
  .tutorial-actions { display: flex; align-items: center; justify-content: space-between; }
  .tut-skip {
    font-size: 11px;
    color: var(--text-light);
    cursor: pointer;
    background: none;
    border: none;
    font-family: 'DM Sans', sans-serif;
    text-decoration: underline;
  }
  .tut-next {
    background: var(--espresso);
    color: var(--cream);
    border: none;
    padding: 12px 28px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .tut-next:hover { opacity: 0.85; }

  /* LOADING */
  .loading-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--espresso);
  }
  .loading-logo {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 36px;
    color: var(--cream);
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

  /* MOBILE */
  @media (max-width: 768px) {
    .app-nav { padding: 0 20px; }
    .welcome-banner { padding: 24px 20px; flex-direction: column; gap: 16px; align-items: flex-start; }
    .app-content { padding: 24px 20px; }
    .modules-grid { grid-template-columns: 1fr; }
    .upgrade-card { flex-direction: column; gap: 16px; }
    .tutorial-card { padding: 32px 24px; }
  }
</style>
</head>

  <!-- WELCOME BANNER -->
  <div class="welcome-banner">

    </div>

    <!-- UPGRADE CARD (shown if not premium) -->
    <div class="upgrade-card" id="upgradeCard" style="display:none;">
      <div class="upgrade-text">
        <div class="upgrade-label">Passe au niveau supérieur</div>
        <div class="upgrade-title">Débloque tous les modules.</div>
        <div class="upgrade-desc">Accède à 100% des fonctionnalités Le Move.</div>
      </div>
      <button class="upgrade-btn" onclick="window.open('https://lemove.fr#pricing','_blank')">Voir les offres →</button>
    </div>

  </div>
</div>

<!-- TUTORIAL OVERLAY -->
<div class="tutorial-overlay" id="tutorialOverlay" style="display:none;">
  <div class="tutorial-card">
    <div class="tutorial-step-indicator" id="tutDots"></div>
    <div class="tutorial-icon" id="tutIcon"></div>

  </div>
</div>

// ── INIT ──
async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    await loadApp(session.user);
  } else {
    document.getElementById('loadingScreen').style.display = 'none';

// ── LOGIN ──

  const email = document.getElementById('authEmail').value;
  const password = document.getElementById('authPassword').value;
  const errEl = document.getElementById('authError');
  errEl.style.display = 'none';

  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) {
    errEl.textContent = 'Email ou mot de passe incorrect.';
    errEl.style.display = 'block';
    return;
  }
  await loadApp(data.user);
}

// ── RESET PASSWORD ──
async function resetPassword() {
  const email = document.getElementById('authEmail').value;
  if (!email) { alert('Entre ton email d\'abord.'); return; }
  await sb.auth.resetPasswordForEmail(email, { redirectTo: 'https://lemove.fr/app' });
  alert('Email de réinitialisation envoyé !');
}

// ── LOGOUT ──
async function logout() {
  await sb.auth.signOut();
  location.reload();
}

// ── LOAD APP ──
async function loadApp(user) {
  currentUser = user;

  // Get plan from Users table
  const { data: userData } = await sb.from('Users').select('Plan').eq('Email', user.email).single();
  currentPlan = (userData?.Plan || 'essentiel').toLowerCase();

  // Update UI
  const firstName = user.email.split('@')[0].split('.')[0];
  const displayName = firstName.charAt(0).toUpperCase() + firstName.slice(1);
  document.getElementById('userName').textContent = displayName;
  document.getElementById('navUser').textContent = user.email;
  document.getElementById('navPlanBadge').textContent = 'Plan ' + currentPlan.charAt(0).toUpperCase() + currentPlan.slice(1);

  // Render modules
  renderModules();

  // Show upgrade card if not premium
  if (currentPlan !== 'premium') {
    document.getElementById('upgradeCard').style.display = 'flex';
  }

  // Show app
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';

  // Show tutorial if first visit
  const tutorialSeen = localStorage.getItem('lemove_tutorial_' + user.id);
  if (!tutorialSeen) {
    setTimeout(() => showTutorial(), 600);
  }

  // Animate progress bar
  setTimeout(() => updateProgress(), 800);
}

// ── RENDER MODULES ──
function renderModules() {
  const grid = document.getElementById('modulesGrid');
  grid.innerHTML = '';

  ALL_MODULES.forEach((mod, i) => {
    const hasAccess = mod.plans.includes(currentPlan);
    const isFeatured = i === 0;

    const card = document.createElement('div');
    card.className = `module-card${isFeatured && hasAccess ? ' featured' : ''}${!hasAccess ? ' locked' : ''}`;

    card.innerHTML = `
      <div class="module-num">Module ${String(i + 1).padStart(2, '0')}</div>
      <div class="module-icon">${mod.icon}</div>
      <div class="module-title">${mod.title}</div>
      <div class="module-desc">${mod.desc}</div>
      <div class="module-tags">
        ${mod.tags.map(t => `<span class="module-tag">${t}</span>`).join('')}
        ${!hasAccess ? `<span class="module-tag" style="background:#FEF2F2;color:#DC2626;">Plan ${mod.plans[0]}</span>` : ''}
      </div>
      ${hasAccess ? '<div class="module-arrow">→</div>' : ''}
    `;

    if (hasAccess) {
      card.onclick = () => openModule(mod.id);
    }

    grid.appendChild(card);
  });
}

// ── OPEN MODULE ──
function openModule(id) {
  // Each module would be a separate page — for now, placeholder
  alert(`Module "${id}" — Page en construction. 🚧`);
}

// ── PROGRESS ──
function updateProgress() {
  const accessibleModules = ALL_MODULES.filter(m => m.plans.includes(currentPlan)).length;
  const total = ALL_MODULES.length;
  const pct = Math.round((accessibleModules / total) * 40); // max 40% from plan alone
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '% complété';
}

// ── TUTORIAL ──
function showTutorial() {
  tutorialStep = 0;
  renderTutorialStep();
  document.getElementById('tutorialOverlay').style.display = 'flex';
}

function renderTutorialStep() {
  const step = TUTORIAL_STEPS[tutorialStep];
  document.getElementById('tutIcon').textContent = step.icon;
  document.getElementById('tutTitle').textContent = step.title;
  document.getElementById('tutText').textContent = step.text;

  const isLast = tutorialStep === TUTORIAL_STEPS.length - 1;
  document.getElementById('tutNextBtn').textContent = isLast ? 'C\'est parti ! →' : 'Suivant →';

  // Dots
  const dots = document.getElementById('tutDots');
  dots.innerHTML = TUTORIAL_STEPS.map((_, i) =>
    `<div class="tut-dot ${i < tutorialStep ? 'done' : i === tutorialStep ? 'active' : ''}"></div>`
  ).join('');
}

function nextTutorial() {
  if (tutorialStep < TUTORIAL_STEPS.length - 1) {
    tutorialStep++;
    renderTutorialStep();
  } else {
    closeTutorial();
  }
}

function closeTutorial() {
  document.getElementById('tutorialOverlay').style.display = 'none';
  if (currentUser) {
    localStorage.setItem('lemove_tutorial_' + currentUser.id, 'seen');
  }
}

// Enter key on password field
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('authPassword')?.addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });
});

init();
</script>
</body>
</html>
