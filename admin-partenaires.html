<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src * data:; script-src * 'unsafe-inline' 'unsafe-eval'; style-src * 'unsafe-inline'; img-src * data: blob:;">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<title>Le Move — Admin Partenaires</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@200;300;400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--cream:#F7F3EE;--warm-white:#FDFAF6;--linen:#E8E0D5;--sand:#C9BAA8;--espresso:#2C1F14;--sage:#7A8C7E;--terracotta:#C4714A;--gold:#B89A6A;--text-light:#8A7968}
body{background:var(--cream);font-family:'DM Sans',sans-serif;color:var(--espresso);min-height:100vh}
.admin-nav{background:var(--espresso);padding:0 40px;height:56px;display:flex;align-items:center;justify-content:space-between}
.admin-logo{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:20px;color:var(--cream)}
.admin-badge{font-size:8px;letter-spacing:0.2em;text-transform:uppercase;background:var(--terracotta);color:white;padding:3px 10px;border-radius:10px}
.admin-content{max-width:1100px;margin:0 auto;padding:40px}
.page-title{font-family:'Cormorant Garamond',serif;font-size:36px;font-style:italic;font-weight:300;color:var(--espresso);margin-bottom:6px}
.page-sub{font-size:12px;font-weight:200;color:var(--text-light);margin-bottom:32px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:32px}
.stat-card{background:var(--warm-white);border:1px solid var(--linen);border-radius:12px;padding:20px}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;color:var(--espresso);line-height:1}
.stat-lbl{font-size:9px;font-weight:300;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-light);margin-top:4px}
.filters{display:flex;gap:8px;margin-bottom:20px}
.filter-btn{padding:7px 16px;border-radius:20px;font-size:11px;font-weight:300;cursor:pointer;border:1px solid var(--linen);background:var(--warm-white);color:var(--text-light);transition:all 0.2s}
.filter-btn:hover{border-color:var(--sand);color:var(--espresso)}
.filter-btn.active{background:var(--espresso);color:var(--cream);border-color:var(--espresso)}
.candidature-card{background:var(--warm-white);border:1px solid var(--linen);border-radius:14px;padding:24px;margin-bottom:14px;transition:all 0.2s}
.candidature-card:hover{border-color:var(--sand)}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px}
.card-name{font-size:16px;font-weight:400;color:var(--espresso)}
.card-meta{font-size:11px;font-weight:200;color:var(--text-light);margin-top:2px}
.card-status{font-size:8px;letter-spacing:0.12em;text-transform:uppercase;padding:4px 12px;border-radius:20px}
.status-en_attente{background:rgba(184,154,106,0.12);color:var(--gold)}
.status-valide{background:rgba(122,140,126,0.12);color:var(--sage)}
.status-refuse{background:rgba(196,113,74,0.1);color:var(--terracotta)}
.card-body{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px}
.card-field{display:flex;flex-direction:column;gap:2px}
.card-field-label{font-size:8px;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-light)}
.card-field-value{font-size:12px;font-weight:300;color:var(--espresso)}
.card-message{background:var(--cream);border-radius:8px;padding:12px 16px;font-size:12px;font-weight:200;color:var(--text-light);line-height:1.6;margin-bottom:16px;font-style:italic}
.card-docs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.doc-btn{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;font-size:10px;font-weight:300;cursor:pointer;border:1px solid var(--linen);background:var(--warm-white);color:var(--text-light);text-decoration:none;transition:all 0.2s}
.doc-btn:hover{border-color:var(--terracotta);color:var(--terracotta)}
.card-actions{display:flex;gap:10px}
.btn-valider{padding:9px 20px;background:var(--sage);color:white;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:opacity 0.2s}
.btn-valider:hover{opacity:0.85}
.btn-refuser{padding:9px 20px;background:none;color:var(--terracotta);border:1px solid var(--terracotta);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:all 0.2s}
.btn-refuser:hover{background:var(--terracotta);color:white}
.btn-contact{padding:9px 20px;background:var(--espresso);color:var(--cream);border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;transition:opacity 0.2s}
.btn-contact:hover{opacity:0.85}
.empty-state{text-align:center;padding:60px;color:var(--text-light);font-size:14px;font-weight:200;font-style:italic}
.loading{text-align:center;padding:40px;color:var(--text-light)}
.auth-block{min-height:100vh;display:flex;align-items:center;justify-content:center}
.auth-card{background:var(--cream);border-radius:20px;padding:48px;max-width:400px;width:90%;text-align:center}
.auth-title{font-family:'Cormorant Garamond',serif;font-size:24px;font-style:italic;font-weight:300;margin-bottom:20px}
.auth-input{width:100%;padding:12px 16px;background:var(--warm-white);border:1px solid var(--linen);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;margin-bottom:12px;transition:border-color 0.2s}
.auth-input:focus{border-color:var(--terracotta)}
.auth-btn{width:100%;padding:13px;background:var(--espresso);color:var(--cream);border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer}
</style>
</head>
<body>

<div id="authBlock" class="auth-block">
  <div class="auth-card">
    <div style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:24px;margin-bottom:4px">Le Move</div>
    <div style="font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-light);margin-bottom:28px">Admin Partenaires</div>
    <div class="auth-title">Accès réservé</div>
    <input type="email" class="auth-input" id="adminEmail" placeholder="Email admin" value="sheryl.mercier@gmail.com">
    <input type="password" class="auth-input" id="adminPwd" placeholder="Mot de passe">
    <button class="auth-btn" onclick="adminLogin()">Accéder →</button>
    <div id="authError" style="color:#DC2626;font-size:11px;margin-top:10px;display:none">Email ou mot de passe incorrect.</div>
  </div>
</div>

<div id="adminBlock" style="display:none">
  <div class="admin-nav">
    <div class="admin-logo">Le Move</div>
    <div style="display:flex;align-items:center;gap:12px">
      <div class="admin-badge">Admin Partenaires</div>
      <div style="font-size:10px;color:rgba(247,243,238,0.4);cursor:pointer" onclick="adminLogout()">Déconnexion</div>
    </div>
  </div>

  <div class="admin-content">
    <div class="page-title">Candidatures Partenaires</div>
    <div class="page-sub">Validez ou refusez les candidatures. Un email est envoyé automatiquement au candidat.</div>

    <div class="stats-row">
      <div class="stat-card"><div class="stat-num" id="statTotal">—</div><div class="stat-lbl">Total candidatures</div></div>
      <div class="stat-card"><div class="stat-num" id="statAttente" style="color:var(--gold)">—</div><div class="stat-lbl">En attente</div></div>
      <div class="stat-card"><div class="stat-num" id="statValide" style="color:var(--sage)">—</div><div class="stat-lbl">Validées</div></div>
      <div class="stat-card"><div class="stat-num" id="statRefuse" style="color:var(--terracotta)">—</div><div class="stat-lbl">Refusées</div></div>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all',this)">Toutes</button>
      <button class="filter-btn" onclick="setFilter('en_attente',this)">En attente</button>
      <button class="filter-btn" onclick="setFilter('valide',this)">Validées</button>
      <button class="filter-btn" onclick="setFilter('refuse',this)">Refusées</button>
    </div>

    <div id="candidaturesList"><div class="loading">Chargement...</div></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://xnmlpxteslwmimmdqjye.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_cCIu5hEEt-zRYpz6qJV2ow_jmDbfJoM';
const ADMIN_EMAIL = 'sheryl.mercier@gmail.com';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let candidatures = [];
let activeFilter = 'all';

async function adminLogin() {
  const email = document.getElementById('adminEmail').value;
  const pwd = document.getElementById('adminPwd').value;
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pwd });
  if (error || data.user.email !== ADMIN_EMAIL) {
    document.getElementById('authError').style.display = 'block';
    return;
  }
  document.getElementById('authBlock').style.display = 'none';
  document.getElementById('adminBlock').style.display = 'block';
  await loadCandidatures();
}

async function adminLogout() {
  await sb.auth.signOut();
  location.reload();
}

// Check existing session
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session && session.user.email === ADMIN_EMAIL) {
    document.getElementById('authBlock').style.display = 'none';
    document.getElementById('adminBlock').style.display = 'block';
    await loadCandidatures();
  }
})();

async function loadCandidatures() {
  const { data } = await sb.from('candidatures_partenaires').select('*').order('created_at', { ascending: false });
  candidatures = data || [];
  updateStats();
  renderList();
}

function updateStats() {
  document.getElementById('statTotal').textContent = candidatures.length;
  document.getElementById('statAttente').textContent = candidatures.filter(c => c.statut === 'en_attente').length;
  document.getElementById('statValide').textContent = candidatures.filter(c => c.statut === 'valide').length;
  document.getElementById('statRefuse').textContent = candidatures.filter(c => c.statut === 'refuse').length;
}

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function renderList() {
  const filtered = activeFilter === 'all' ? candidatures : candidatures.filter(c => c.statut === activeFilter);
  const list = document.getElementById('candidaturesList');
  if (!filtered.length) { list.innerHTML = '<div class="empty-state">Aucune candidature dans cette catégorie.</div>'; return; }

  list.innerHTML = filtered.map(c => {
    const date = new Date(c.created_at).toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
    const isAttente = c.statut === 'en_attente';
    return `<div class="candidature-card" id="card-${c.id}">
      <div class="card-header">
        <div>
          <div class="card-name">${c.prenom} ${c.nom} — ${c.entreprise}</div>
          <div class="card-meta">${c.activite} · ${c.zone} · Candidaté le ${date}</div>
        </div>
        <div class="card-status status-${c.statut}">${c.statut === 'en_attente' ? 'En attente' : c.statut === 'valide' ? '✓ Validé' : '✕ Refusé'}</div>
      </div>
      <div class="card-body">
        <div class="card-field"><div class="card-field-label">Email</div><div class="card-field-value"><a href="mailto:${c.email}" style="color:var(--terracotta)">${c.email}</a></div></div>
        <div class="card-field"><div class="card-field-label">Téléphone</div><div class="card-field-value">${c.telephone || '—'}</div></div>
        <div class="card-field"><div class="card-field-label">SIRET</div><div class="card-field-value">${c.siret || '—'}</div></div>
        <div class="card-field"><div class="card-field-label">Site web</div><div class="card-field-value">${c.site ? `<a href="${c.site}" target="_blank" style="color:var(--terracotta)">${c.site}</a>` : '—'}</div></div>
      </div>
      ${c.message ? `<div class="card-message">"${c.message}"</div>` : ''}
      <div class="card-docs">
        ${c.kbis_url ? `<button class="doc-btn" onclick="viewDoc('${c.kbis_url}')">📄 Kbis</button>` : '<span style="font-size:10px;color:var(--terracotta)">⚠ Kbis manquant</span>'}
        ${c.rc_pro_url ? `<button class="doc-btn" onclick="viewDoc('${c.rc_pro_url}')">🛡️ RC Pro</button>` : '<span style="font-size:10px;color:var(--terracotta)">⚠ RC Pro manquant</span>'}
        ${c.diplomes_url ? `<button class="doc-btn" onclick="viewDoc('${c.diplomes_url}')">🎓 Diplômes</button>` : ''}
      </div>
      ${isAttente ? `<div class="card-actions">
        <button class="btn-valider" onclick="valider('${c.id}','${c.email}','${c.prenom}','${c.nom}')">✓ Valider</button>
        <button class="btn-refuser" onclick="refuser('${c.id}','${c.email}','${c.prenom}')">✕ Refuser</button>
        <a href="mailto:${c.email}" class="btn-contact">✉ Contacter</a>
      </div>` : `<div style="font-size:11px;font-weight:200;color:var(--text-light);font-style:italic">
        ${c.statut === 'valide' ? '✓ Dossier validé — lien Stripe envoyé' : '✕ Candidature refusée'}
      </div>`}
    </div>`;
  }).join('');
}

async function viewDoc(path) {
  const { data } = await sb.storage.from('partenaires-docs').createSignedUrl(path, 300);
  if (data?.signedUrl) window.open(data.signedUrl, '_blank');
}

async function valider(id, email, prenom, nom) {
  if (!confirm(`Valider la candidature de ${prenom} ${nom} et envoyer le lien de paiement ?`)) return;
  await sb.from('candidatures_partenaires').update({ statut: 'valide', stripe_link_sent: true }).eq('id', id);

  // Send validation email with Stripe link
  // TODO: Replace with real Stripe payment link after creating it
  const stripeLink = 'https://buy.stripe.com/9B63cv9HickT8pLeF56EU06';

  await fetch('https://api.resend.com/emails', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer re_AkX5NcPE_Bhfi4gZXvGH3kjwXatBdaFGn' },
    body: JSON.stringify({
      from: 'Le Move <bonjour@lemove.fr>',
      to: email,
      subject: '✦ Votre candidature Partenaire Le Move est validée !',
      html: `<!DOCTYPE html><html><body style="font-family:Arial,sans-serif;background:#F7F3EE;padding:40px 20px">
        <div style="max-width:560px;margin:0 auto;background:white;border-radius:16px;overflow:hidden">
          <div style="background:#2C1F14;padding:40px;text-align:center">
            <div style="font-family:Georgia,serif;font-style:italic;font-size:28px;color:#F7F3EE">Le Move</div>
          </div>
          <div style="padding:40px">
            <div style="font-family:Georgia,serif;font-style:italic;font-size:26px;color:#2C1F14;margin-bottom:16px">Félicitations ${prenom} ! ✦</div>
            <p style="font-size:14px;color:#6B5C4E;line-height:1.8;margin-bottom:24px">
              Votre candidature Partenaire Le Move a été examinée et <strong>validée</strong>. Bienvenue dans notre réseau de professionnels de confiance !
            </p>
            <div style="background:#F7F3EE;border-radius:12px;padding:24px;margin-bottom:28px">
              <div style="font-size:13px;font-weight:bold;color:#2C1F14;margin-bottom:12px">Ce qui vous attend :</div>
              <div style="font-size:12px;color:#6B5C4E;line-height:2">
                ✦ Badge "Partenaire vérifié" dans l'annuaire<br>
                📊 Dashboard stats (vues, clics, contacts)<br>
                💬 Messagerie directe avec les utilisateurs<br>
                📍 Mise en avant dans votre zone géographique<br>
                📈 Accès aux données de votre secteur
              </div>
            </div>
            <div style="background:#2C1F14;border-radius:12px;padding:24px;text-align:center;margin-bottom:24px">
              <div style="font-size:12px;color:rgba(247,243,238,0.5);margin-bottom:8px">Tarif Fondateurs · Offre limitée</div>
              <div style="font-family:Georgia,serif;font-size:48px;color:#F7F3EE;line-height:1">39€<span style="font-size:16px">/mois</span></div>
              <div style="font-size:11px;color:rgba(247,243,238,0.4);margin-top:4px">Sans engagement · Garanti 6 mois</div>
            </div>
            <div style="text-align:center;margin-bottom:24px">
              <a href="${stripeLink}" style="display:inline-block;background:#C4714A;color:white;text-decoration:none;padding:16px 40px;border-radius:8px;font-size:12px;letter-spacing:0.1em;text-transform:uppercase">
                Activer mon accès Partenaire →
              </a>
            </div>
            <p style="font-size:11px;color:#9C8B7E;text-align:center">Des questions ? Répondez à cet email, nous répondons sous 24h.</p>
          </div>
        </div>
      </body></html>`
    })
  });

  const c = candidatures.find(c => c.id === id);
  if (c) c.statut = 'valide';
  updateStats();
  renderList();
  alert('✓ Candidature validée et email envoyé !');
}

async function refuser(id, email, prenom) {
  const raison = prompt('Motif de refus (optionnel) :');
  if (raison === null) return;
  await sb.from('candidatures_partenaires').update({ statut: 'refuse' }).eq('id', id);

  await fetch('https://api.resend.com/emails', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer re_AkX5NcPE_Bhfi4gZXvGH3kjwXatBdaFGn' },
    body: JSON.stringify({
      from: 'Le Move <bonjour@lemove.fr>',
      to: email,
      subject: 'Votre candidature Partenaire Le Move',
      html: `<div style="font-family:Arial,sans-serif;padding:40px;max-width:560px;margin:0 auto">
        <div style="font-family:Georgia,serif;font-style:italic;font-size:24px;color:#2C1F14;margin-bottom:20px">Le Move</div>
        <p style="font-size:14px;color:#6B5C4E;line-height:1.8">Bonjour ${prenom},</p>
        <p style="font-size:14px;color:#6B5C4E;line-height:1.8">Nous avons examiné votre candidature et ne sommes pas en mesure de l'accepter à ce stade.${raison ? '<br><br>Motif : ' + raison : ''}</p>
        <p style="font-size:14px;color:#6B5C4E;line-height:1.8">Vous pouvez soumettre une nouvelle candidature dans 3 mois ou contacter notre équipe pour plus d'informations.</p>
        <p style="font-size:12px;color:#9C8B7E;margin-top:24px">L'équipe Le Move · bonjour@lemove.fr</p>
      </div>`
    })
  });

  const c = candidatures.find(c => c.id === id);
  if (c) c.statut = 'refuse';
  updateStats();
  renderList();
  alert('✕ Candidature refusée et email envoyé.');
}

document.getElementById('adminPwd')?.addEventListener('keydown', e => { if (e.key === 'Enter') adminLogin(); });
</script>
</body>
</html>
