<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Move — Mon espace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@200;300;400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --espresso: #2C1F14;
    --cream: #F7F3EE;
    --linen: #EDE8E1;
    --terracotta: #C4714A;
    --gold: #B89A6A;
    --text-light: #8A7A6A;
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--linen);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .auth-container {
    width: 100%;
    max-width: 420px;
  }
  .auth-logo {
    text-align: center;
    margin-bottom: 40px;
  }
  .auth-logo-title {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 36px;
    font-weight: 300;
    color: var(--espresso);
    line-height: 1;
  }
  .auth-logo-sub {
    font-size: 10px;
    font-weight: 200;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-light);
    margin-top: 6px;
  }
  .auth-card {
    background: white;
    border-radius: 20px;
    padding: 40px 36px;
    box-shadow: 0 8px 40px rgba(44,31,20,0.08);
  }
  .auth-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 32px;
    border-bottom: 1px solid var(--linen);
  }
  .auth-tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-light);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.2s;
  }
  .auth-tab.active {
    color: var(--espresso);
    border-bottom-color: var(--espresso);
  }
  .auth-form { display: none; flex-direction: column; gap: 16px; }
  .auth-form.active { display: flex; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-label {
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-light);
  }
  .form-input {
    padding: 12px 16px;
    border: 1px solid var(--linen);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 300;
    color: var(--espresso);
    background: var(--linen);
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus { border-color: var(--gold); background: white; }
  .form-btn {
    margin-top: 8px;
    padding: 14px;
    background: var(--espresso);
    color: var(--cream);
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .form-btn:hover { background: #3d2a1a; }
  .form-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .form-message {
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 300;
    text-align: center;
    display: none;
  }
  .form-message.error { background: #fef2f0; color: #c0392b; display: block; }
  .form-message.success { background: #f0faf4; color: #27ae60; display: block; }
  .auth-footer {
    text-align: center;
    margin-top: 24px;
    font-size: 11px;
    font-weight: 200;
    color: var(--text-light);
  }
  .auth-footer a {
    color: var(--terracotta);
    text-decoration: none;
  }
</style>
</head>
<body>

<div class="auth-container">
  <div class="auth-logo">
    <div class="auth-logo-title">Le Move</div>
    <div class="auth-logo-sub">par Maison Florélis</div>
  </div>

  <div class="auth-card">
    <div class="auth-tabs">
      <div class="auth-tab active" onclick="switchTab('login')">Connexion</div>
      <div class="auth-tab" onclick="switchTab('signup')">Créer un compte</div>
    </div>

    <!-- Connexion -->
    <form class="auth-form active" id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="login-email" placeholder="ton@email.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <input class="form-input" type="password" id="login-password" placeholder="••••••••" required>
      </div>
      <div class="form-message" id="login-msg"></div>
      <button class="form-btn" type="submit" id="login-btn">Se connecter</button>
    </form>

    <!-- Inscription -->
    <form class="auth-form" id="signup-form" onsubmit="handleSignup(event)">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="signup-email" placeholder="ton@email.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <input class="form-input" type="password" id="signup-password" placeholder="8 caractères minimum" required minlength="8">
      </div>
      <div class="form-group">
        <label class="form-label">Confirmer le mot de passe</label>
        <input class="form-input" type="password" id="signup-confirm" placeholder="••••••••" required>
      </div>
      <div class="form-message" id="signup-msg"></div>
      <button class="form-btn" type="submit" id="signup-btn">Créer mon espace</button>
    </form>
  </div>

  <div class="auth-footer">
    <a href="https://lemove.fr">← Retour à l'accueil</a>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://xnmlpxteslwmimmdqjye.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhubWxweHRlc2x3bWltbWRxanllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NTQ0MTAsImV4cCI6MjA4ODIzMDQxMH0.0KZr0Oso03fMjQSq0aP0fqUOWIRgNnaZYwBv47uDNgw';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  function switchTab(tab) {
    document.querySelectorAll('.auth-tab').forEach((t, i) => {
      t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'signup' && i === 1));
    });
    document.getElementById('login-form').classList.toggle('active', tab === 'login');
    document.getElementById('signup-form').classList.toggle('active', tab === 'signup');
  }

  function showMsg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = 'form-message ' + type;
  }

  async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    btn.disabled = true;
    btn.textContent = 'Connexion...';
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) {
      showMsg('login-msg', 'Email ou mot de passe incorrect.', 'error');
      btn.disabled = false;
      btn.textContent = 'Se connecter';
    } else {
      showMsg('login-msg', 'Connexion réussie ! Redirection...', 'success');
      setTimeout(() => window.location.href = '/app', 1500);
    }
  }

  async function handleSignup(e) {
    e.preventDefault();
    const btn = document.getElementById('signup-btn');
    const password = document.getElementById('signup-password').value;
    const confirm = document.getElementById('signup-confirm').value;
    if (password !== confirm) {
      showMsg('signup-msg', 'Les mots de passe ne correspondent pas.', 'error');
      return;
    }
    btn.disabled = true;
    btn.textContent = 'Création...';
    const email = document.getElementById('signup-email').value;
    const { data, error } = await sb.auth.signUp({ email, password });
    if (error) {
      showMsg('signup-msg', error.message, 'error');
      btn.disabled = false;
      btn.textContent = 'Créer mon espace';
    } else {
      showMsg('signup-msg', 'Compte créé ! Vérifie ton email pour confirmer.', 'success');
      btn.textContent = 'Email envoyé ✓';
    }
  }

  // Check if already logged in
  sb.auth.getSession().then(({ data }) => {
    if (data.session) window.location.href = '/app';
  });
</script>
</body>
</html>
