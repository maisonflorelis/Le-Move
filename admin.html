<!DOCTYPE html>
<html lang="fr">

<script>

// Apply plan restrictions to sidebar nav
function applyPlanToSidebar(plan) {
  var planRank = { essentiel: 1, complet: 2, premium: 3 };
  var requiredRank = { essentiel: 1, complet: 2, premium: 3 };
  var userRank = planRank[plan] || 1;
  var tooltip = document.getElementById('navLockTooltip');

  document.querySelectorAll('.nav-item[data-required]').forEach(function(el) {
    var req = el.getAttribute('data-required');
    var reqRank = requiredRank[req] || 1;
    var lock = el.querySelector('.nav-plan-lock');

    if (userRank < reqRank) {
      el.classList.add('nav-locked');
      if (lock) lock.textContent = '🔒';
      el.onmouseenter = function(e) {
        if (tooltip) {
          var label = req === 'premium' ? 'Plan Premium' : 'Plan Complet';
          tooltip.textContent = 'Accès ' + label;
          tooltip.style.display = 'block';
          tooltip.style.left = (e.clientX + 12) + 'px';
          tooltip.style.top = (e.clientY - 8) + 'px';
        }
      };
      el.onmousemove = function(e) {
        if (tooltip) {
          tooltip.style.left = (e.clientX + 12) + 'px';
          tooltip.style.top = (e.clientY - 8) + 'px';
        }
      };
      el.onmouseleave = function() {
        if (tooltip) tooltip.style.display = 'none';
      };
    } else {
      el.classList.remove('nav-locked');
      if (lock) lock.textContent = '✦';
    }
  });
}

function navClick(el, href) {
  if (el.classList.contains('nav-locked')) return;
  window.location.href = href;
}

function toggleMenu() {
  const drawer = document.getElementById('mobileDrawer');
  const overlay = document.getElementById('mobileOverlay');
  const ham = document.getElementById('hamburger');
  if(!drawer || !overlay || !ham) return;
  drawer.classList.toggle('open');
  overlay.classList.toggle('open');
  ham.classList.toggle('open');
}
function closeMenu() {
  const drawer = document.getElementById('mobileDrawer');
  const overlay = document.getElementById('mobileOverlay');
  const ham = document.getElementById('hamburger');
  if(drawer) drawer.classList.remove('open');
  if(overlay) overlay.classList.remove('open');
  if(ham) ham.classList.remove('open');
}
// Set active item
const currentPage = window.location.pathname.split('/').pop() || 'app.html';
document.querySelectorAll('.mobile-drawer .nav-item').forEach(el => {
  if(el.getAttribute('href') === currentPage) el.classList.add('active');
});
// Set username after load
setTimeout(() => {
  const user = document.getElementById('sidebarUser');
  const mobileUser = document.getElementById('mobileUser');
  if(user && mobileUser && user.textContent) mobileUser.textContent = user.textContent;
}, 2000);
async function getModuleProgress() {
  const { data } = await sb.from('admin_taches').select('fait').eq('user_id', currentUser.id);
  if (!data || !data.length) return 0;
  return Math.round((data.filter(t=>t.fait).length/data.length)*100);
}

async function renderModuleProgress() {
  try {
    const pct = await getModuleProgress();
    const strip = document.getElementById('moduleProgressStrip');
    const fill = document.getElementById('moduleProgressFill');
    const pctEl = document.getElementById('moduleProgressPct');
    if (strip) strip.style.display = 'flex';
    if (fill) fill.style.width = pct + '%';
    if (pctEl) pctEl.textContent = pct + '%';
  } catch(e) { console.warn('Progress error:', e); }
}

</script>
</script>
<script>
// ── NOTIFICATIONS (module) ──
let notifications = [];
let notifOpen = false;
const NOTIF_ICONS = { livraison: '🚚', urgente: '⚠️', jourj: '📅', module: '✨', collab: '🤝' };
const NOTIF_ICON_CLASS = { livraison: 'notif-icon-livraison', urgente: 'notif-icon-urgente', jourj: 'notif-icon-jourj', module: 'notif-icon-module', collab: 'notif-icon-collab' };

async function loadNotifications(userId) {
  const { data } = await sb.from('notifications').select('*').eq('user_id', userId).eq('lue', false).order('created_at', { ascending: false }).limit(10);
  notifications = data || [];
  renderNotifBadge();
  renderNotifPanel();
}
function renderNotifBadge() {
  const unread = notifications.filter(n => !n.lue).length;
  const badge = document.getElementById('notifBadge');
  if (badge) { badge.style.display = unread > 0 ? 'flex' : 'none'; badge.textContent = unread > 9 ? '9+' : unread; }
}
function renderNotifPanel() {
  const list = document.getElementById('notifList');
  if (!list) return;
  if (!notifications.length) { list.innerHTML = '<div class="notif-empty">Tout est à jour ✓</div>'; return; }
  list.innerHTML = notifications.map(n => {
    const ago = timeAgo(n.created_at);
    const cls = n.lue ? 'notif-item' : 'notif-item unread';
    const icon = NOTIF_ICONS[n.type] || '🔔';
    const iconCls = NOTIF_ICON_CLASS[n.type] || '';
    return '<div class="' + cls + '" data-id="' + n.id + '" data-lien="' + (n.lien||'') + '" onclick="clickNotifEl(this)">' +
      '<div class="notif-icon ' + iconCls + '">' + icon + '</div>' +
      '<div class="notif-content">' +
        '<div class="notif-title">' + n.titre + '</div>' +
        '<div class="notif-msg">' + (n.message || '') + '</div>' +
        '<div class="notif-time">' + ago + '</div>' +
      '</div></div>';
  }).join('');
}

async function clickNotif(id, lien) {
  await sb.from('notifications').update({lue:true}).eq('id',id);
  notifications = notifications.filter(n=>n.id!==id);
  renderNotifBadge(); renderNotifPanel();
  if(lien) window.location.href = lien;
  closeNotifPanel();
}
async function markAllRead() {
  const ids = notifications.map(n=>n.id);
  if(ids.length) await sb.from('notifications').update({lue:true}).in('id',ids);
  notifications=[]; renderNotifBadge(); renderNotifPanel();
}
function toggleNotifPanel() {
  notifOpen=!notifOpen;
  const p=document.getElementById('notifPanel');
  if(p) p.classList.toggle('open',notifOpen);
}
function closeNotifPanel() {
  notifOpen=false;
  const p=document.getElementById('notifPanel');
  if(p) p.classList.remove('open');
}
</script><script>
document.addEventListener('click',e=>{
  if(!e.target.closest('#notifBell')&&!e.target.closest('#notifPanel')) closeNotifPanel();
});

</script><script>
window.addEventListener('load', () => {
  setTimeout(() => {
    if(typeof loadNotifications === 'function' && typeof currentUser !== 'undefined' && currentUser) {
      loadNotifications(currentUser.id);
    }
  }, 1500);
});
</script>

<script data-cfasync="false">
// Plan verification from Supabase
(function() {
  var PLAN_ORDER = { essentiel: 0, complet: 1, premium: 2 };

  async function getVerifiedPlan() {
    try {
      var cached = JSON.parse(localStorage.getItem('lm_plan') || '"essentiel"');
      // Verify against Supabase
      var session = await window._sb?.auth.getSession();
      if (!session?.data?.session) return cached;
      var uid = session.data.session.user.id;
      var res = await window._sb.from('Users').select('Plan').eq('id', uid).single();
      if (res.data?.Plan) {
        var plan = res.data.Plan.toLowerCase();
        localStorage.setItem('lm_plan', JSON.stringify(plan));
        return plan;
      }
      return cached;
    } catch(e) {
      return JSON.parse(localStorage.getItem('lm_plan') || '"essentiel"');
    }
  }

  function applyNavLocks(plan) {
    // Admin always has full access
    var adminEmail = 'sheryl.mercier@gmail.com';
    var storedEmail = localStorage.getItem('lm_user_email') || '';
    if (storedEmail === adminEmail || plan === 'admin') {
      document.querySelectorAll('.nav-locked').forEach(function(el) {
        var lock = el.querySelector('.nav-lock');
        if (lock) lock.style.display = 'none';
        el.style.opacity = '1';
        el.style.pointerEvents = 'auto';
        el.classList.remove('nav-locked');
      });
      return;
    }
    var planRank = PLAN_ORDER[plan] || 0;
    document.querySelectorAll('.nav-locked').forEach(function(el) {
      var required = el.getAttribute('data-plan');
      var reqRank = PLAN_ORDER[required] || 0;
      if (planRank >= reqRank) {
        var lock = el.querySelector('.nav-lock');
        if (lock) lock.style.display = 'none';
        el.style.opacity = '1';
        el.style.pointerEvents = 'auto';
      } else {
        el.style.opacity = '0.4';
        el.style.pointerEvents = 'auto';
      }
    });
  }

  window.navItemClick = function(el, href) {
    var plan = JSON.parse(localStorage.getItem('lm_plan') || '"essentiel"');
    var planRank = PLAN_ORDER[plan] || 0;
    var required = el.getAttribute('data-plan');
    var reqRank = PLAN_ORDER[required] || 0;
    if (planRank >= reqRank) {
      window.location.href = href;
    } else {
      var label = required === 'complet' ? 'Complet (89€)' : 'Premium (150€)';
      if (confirm('Ce module nécessite le plan ' + label + '.\nVoir les offres ?')) {
        window.open('https://lemove.fr#pricing', '_blank');
      }
    }
  };

  window.setNavPlan = function(plan) {
    localStorage.setItem('lm_plan', JSON.stringify(plan));
    applyNavLocks(plan);
  };

  document.addEventListener('DOMContentLoaded', function() {
    var cached = JSON.parse(localStorage.getItem('lm_plan') || '"essentiel"');
    applyNavLocks(cached);
    // Verify with Supabase after page load
    setTimeout(function() {
      getVerifiedPlan().then(function(plan) {
        applyNavLocks(plan);
      });
    }, 800);
  });
})();
</script>
</body>
